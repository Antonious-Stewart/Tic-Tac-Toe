 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="/assest/Css/app.css">
  <title>Tic-Tac-Toe</title>
</head>
<body>
  <div class="container">
    <h1 class="title">Tic-Tac-Toe</h1>
    <input type="text" placeholder="Player One">
    <input type="text" placeholder="Player 2">
    <span id="turns"></span>
    <div id="board">
        
      <table class="game">
        <tbody>
          <tr id="top">
            <td class="top left-cell"></td>
            <td class="top middle-cell"></td>
            <td class="top right-cell"></td>
          </tr>
          <tr id="middle">
              <td class="middle left-cell"></td>
              <td class="middle middle-cell"></td>
              <td class="middle right-cell"></td>
          </tr>
          <tr id="bottom">
              <td class="bottom left-cell"></td>
              <td class="bottom middle-cell"></td>
              <td class="bottom right-cell"></td> 
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  <script src="/assest/Js/app.js"></script>
</body>
</html>
